# FenrirOS Calamares Settings
# /etc/calamares/settings.conf

---
modules-search: [ local, /usr/lib/calamares/modules ]

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - fstab
    - locale
    - keyboard
    - localecfg
    - initcpiocfg
    - shellprocess
    - initcpio
    - removeuser
    - users
    - networkcfg
    - hwclock
    - services-openrc
    - bootloader
    - grubcfg
    - umount
  - show:
    - finished

branding: fenriros

prompt-install: true

dont-chroot: false

oem-setup: false

disable-cancel: false

disable-cancel-during-exec: true

hide-back-and-next-during-exec: true

quit-at-end: false
