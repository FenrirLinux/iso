# FenrirOS - fenrir-postcfg Calamares module

---
type: shellprocess
chroot: true

script:
    # Generate machine-id (replaces systemd-machine-id-setup)
    - rm -f /etc/machine-id
    - dbus-uuidgen --ensure=/etc/machine-id

    # libsystemd.so.0 symlink for SDDM and other apps
    - ln -sf /usr/lib/libelogind.so.0 /usr/lib/libsystemd.so.0

    # Create mkinitcpio.conf with udev (not systemd) hooks
    - "sh -c 'echo \"MODULES=()\" > /etc/mkinitcpio.conf'"
    - "sh -c 'echo \"BINARIES=()\" >> /etc/mkinitcpio.conf'"
    - "sh -c 'echo \"FILES=()\" >> /etc/mkinitcpio.conf'"
    - "sh -c 'echo \"HOOKS=(base fenrir-udev autodetect modconf kms keyboard keymap consolefont block filesystems fsck)\" >> /etc/mkinitcpio.conf'"

    # Create linux-cachyos preset for mkinitcpio
    - mkdir -p /etc/mkinitcpio.d
    - "sh -c 'echo \"ALL_config=/etc/mkinitcpio.conf\" > /etc/mkinitcpio.d/linux-cachyos.preset'"
    - "sh -c 'echo \"ALL_kver=/boot/vmlinuz-linux-cachyos\" >> /etc/mkinitcpio.d/linux-cachyos.preset'"
    - "sh -c 'echo \"PRESETS=(default fallback)\" >> /etc/mkinitcpio.d/linux-cachyos.preset'"
    - "sh -c 'echo \"default_image=/boot/initramfs-linux-cachyos.img\" >> /etc/mkinitcpio.d/linux-cachyos.preset'"
    - "sh -c 'echo \"fallback_image=/boot/initramfs-linux-cachyos-fallback.img\" >> /etc/mkinitcpio.d/linux-cachyos.preset'"
    - "sh -c 'echo \"fallback_options=-S autodetect\" >> /etc/mkinitcpio.d/linux-cachyos.preset'"
    - ln -sf /etc/mkinitcpio.d/linux-cachyos.preset /etc/mkinitcpio.d/linux.preset

    # Set up PAM elogind for session management
    - /usr/local/bin/fenrir-setup-pam /

    # Configure SCX scheduler default
    - mkdir -p /etc/scx
    - "sh -c 'echo \"SCHEDULER=scx_lavd\" > /etc/scx/scheduler.conf'"

    # Set vm.max_map_count for Steam/Proton
    - "sh -c 'echo \"vm.max_map_count=2147483642\" >> /etc/sysctl.d/99-fenriros-gaming.conf'"

    # Reduce swappiness for gaming
    - "sh -c 'echo \"vm.swappiness=10\" >> /etc/sysctl.d/99-fenriros-gaming.conf'"

    # Ensure correct permissions on elogind runtime
    - mkdir -p /run/user
    - chmod 0755 /run/user

    # Add default user to gamemode group
    - groupadd -f gamemode

timeout: 120
