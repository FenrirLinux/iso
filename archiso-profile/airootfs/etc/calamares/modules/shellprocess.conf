# FenrirOS - Calamares shellprocess module

---
type: shellprocess
chroot: true

script:
    # Set FenrirOS identity
    - "sh -c 'echo \"NAME=FenrirOS\" > /etc/os-release'"
    - "sh -c 'echo \"PRETTY_NAME=\\\"FenrirOS 0.1 Midgard\\\"\" >> /etc/os-release'"
    - "sh -c 'echo \"ID=fenriros\" >> /etc/os-release'"
    - "sh -c 'echo \"ID_LIKE=artix\" >> /etc/os-release'"
    - "sh -c 'echo \"BUILD_ID=rolling\" >> /etc/os-release'"
    - "sh -c 'echo \"HOME_URL=https://fenrirlinux.org\" >> /etc/os-release'"

    # Generate machine-id
    - rm -f /etc/machine-id
    - dbus-uuidgen --ensure=/etc/machine-id

    # libsystemd.so.0 symlink for SDDM and other apps
    - ln -sf /usr/lib/libelogind.so.0 /usr/lib/libsystemd.so.0

    # Create mkinitcpio.conf with fenrir-udev hooks
    - "sh -c 'printf \"MODULES=()\nBINARIES=()\nFILES=()\nHOOKS=(base fenrir-udev autodetect modconf kms keyboard keymap consolefont block filesystems fsck)\n\" > /etc/mkinitcpio.conf'"

    # Create mkinitcpio preset with dynamic kernel version detection
    - /usr/local/bin/fenrir-mkinitcpio-setup

    # Set up PAM for elogind session management
    - mkdir -p /etc/pam.d
    - "sh -c 'echo \"session required pam_elogind.so\" >> /etc/pam.d/system-login'"
    - mkdir -p /etc/tmpfiles.d
    - "sh -c 'echo \"d /run/user 0755 root root -\" > /etc/tmpfiles.d/fenrir-runtime.conf'"

    # Configure SCX scheduler default
    - mkdir -p /etc/scx
    - "sh -c 'echo \"SCHEDULER=scx_lavd\" > /etc/scx/scheduler.conf'"

    # Gaming tweaks
    - "sh -c 'echo \"vm.max_map_count=2147483642\" >> /etc/sysctl.d/99-fenriros-gaming.conf'"
    - "sh -c 'echo \"vm.swappiness=10\" >> /etc/sysctl.d/99-fenriros-gaming.conf'"

    # Ensure correct permissions on elogind runtime
    - mkdir -p /run/user
    - chmod 0755 /run/user

    # Add default user to gamemode group
    - groupadd -f gamemode

    # Auto-detect and install NVIDIA drivers if present (non-fatal)
    - "sh -c '/usr/local/bin/fenrir-nvidia-setup || true'"

    # Enable OpenRC services
    - rc-update add udev sysinit
    - rc-update add dbus default
    - rc-update add elogind default
    - rc-update add NetworkManager default
    - rc-update add sddm default
    - rc-update add acpid default || true
    - rc-update add cronie default || true
    - rc-update add gamemoded default || true

    # Copy kernel to /boot (Calamares doesn't do this for CachyOS kernel)
    - "sh -c 'cp /usr/lib/modules/$(ls /usr/lib/modules | grep cachyos | head -1)/vmlinuz /boot/vmlinuz-linux-cachyos'"

    # Install GRUB to EFI fallback path so UEFI always finds it
    - mkdir -p /boot/efi/EFI/BOOT
    - grub-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id=FenrirOS --no-nvram
    - "sh -c 'cp /boot/efi/EFI/FenrirOS/grubx64.efi /boot/efi/EFI/BOOT/BOOTX64.EFI'"
    - grub-mkconfig -o /boot/grub/grub.cfg

timeout: 120
