# FenrirOS - fenrir-postcfg Calamares module
# /etc/calamares/modules/fenrir-postcfg.conf
#
# Runs FenrirOS-specific post-install configuration steps
# after the base system is installed. This is where our
# custom scripts get called — PAM setup, gaming tweaks, etc.

---
type: shellprocess
chroot: true

script:
    # Set up PAM elogind for session management
    - /usr/local/bin/fenrir-setup-pam /

    # Configure SCX scheduler default
    - mkdir -p /etc/scx
    - echo "SCHEDULER=scx_lavd" > /etc/scx/scheduler.conf

    # Set vm.max_map_count for Steam/Proton
    - echo "vm.max_map_count=2147483642" >> /etc/sysctl.d/99-fenriros-gaming.conf

    # Reduce swappiness for gaming
    - echo "vm.swappiness=10" >> /etc/sysctl.d/99-fenriros-gaming.conf

    # Ensure correct permissions on elogind runtime
    - mkdir -p /run/user
    - chmod 0755 /run/user

    # Add default user to gamemode group
    - groupadd -f gamemode

timeout: 120
