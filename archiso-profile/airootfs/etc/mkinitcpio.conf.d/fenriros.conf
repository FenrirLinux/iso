# FenrirOS mkinitcpio config for live ISO
# Ensures CD-ROM and storage modules are available at boot
# No autodetect - we need all modules for live ISO

MODULES=(ahci ata_piix libata sr_mod cdrom iso9660 squashfs loop overlay virtio virtio_pci virtio_blk usb_storage uas usbhid ehci_hcd ehci_pci xhci_hcd xhci_pci)
BINARIES=()
FILES=()
HOOKS=(base fenrir-udev modconf kms keyboard keymap consolefont block filesystems fsck archiso)
