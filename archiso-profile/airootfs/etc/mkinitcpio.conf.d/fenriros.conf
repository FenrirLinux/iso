# FenrirOS mkinitcpio config for live ISO
# Ensures CD-ROM and storage modules are available at boot
# No autodetect - we need all modules for live ISO

MODULES=(ahci ata_piix libata sr_mod cdrom iso9660 squashfs loop overlay virtio virtio_pci virtio_blk)
BINARIES=()
FILES=()
HOOKS=(base udev modconf kms keyboard keymap consolefont block filesystems fsck archiso)
