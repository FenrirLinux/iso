# FenrirOS OpenRC global configuration
# /etc/rc.conf

# --- System ---
# Set to the timezone you want
# Can be overridden during install
unicode="YES"

# --- Logging ---
rc_logger="YES"
rc_log_path="/var/log/rc.log"

# --- Parallel startup ---
# Enable parallel service startup for faster boot
rc_parallel="YES"

# --- Crash behavior ---
rc_crash_action="reboot"

# --- Dynamic cgroups ---
# Required for elogind and proper session management
rc_cgroup_mode="unified"

# --- Dependency checking ---
rc_depend_strict="NO"

# --- Hotplugging ---
# Use udev for device management
rc_hotplug="*"

# --- Coloured output ---
rc_color="YES"
