# FenrirOS GRUB config for live ISO

set default=0
set timeout=5

menuentry "FenrirOS - Unchained" {
    set gfxpayload=keep
    linux   /arch/boot/x86_64/vmlinuz-linux-cachyos archisobasedir=arch archisolabel=FENRIR_202604 cow_spacesize=10G
    initrd  /arch/boot/x86_64/initramfs-linux-cachyos.img
}

menuentry "FenrirOS - Unchained (copy-to-RAM)" {
    set gfxpayload=keep
    linux   /arch/boot/x86_64/vmlinuz-linux-cachyos archisobasedir=arch archisolabel=FENRIR_202604 cow_spacesize=10G copytoram
    initrd  /arch/boot/x86_64/initramfs-linux-cachyos.img
}
