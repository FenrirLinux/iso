#
# FenrirOS pacman.conf
# Includes CachyOS performance repos for optimized packages
#

[options]
HoldPkg      = pacman glibc
Architecture = auto
Color
CheckSpace
ParallelDownloads = 5
SigLevel    = Never
LocalFileSigLevel = Optional
# Ignore init systems that conflict with OpenRC
IgnorePkg   = systemd systemd-libs systemd-sysvcompat dinit dinit-userservices s6 s6-rc runit

# CachyOS repositories - znver4 optimized + base
[cachyos-znver4]
Include = /etc/pacman.d/cachyos-v4-mirrorlist

[cachyos-core-znver4]
Include = /etc/pacman.d/cachyos-v4-mirrorlist

[cachyos-extra-znver4]
Include = /etc/pacman.d/cachyos-v4-mirrorlist

[cachyos]
Include = /etc/pacman.d/cachyos-mirrorlist

# Artix repos - source of OpenRC, elogind, and related packages
[system]
Server = https://mirrors.dotsrc.org/artix-linux/repos/$repo/os/$arch
Server = https://mirror.pascalpuffke.de/artix-linux/$repo/os/$arch

[world]
Server = https://mirrors.dotsrc.org/artix-linux/repos/$repo/os/$arch
Server = https://mirror.pascalpuffke.de/artix-linux/$repo/os/$arch

[galaxy]
Server = https://mirrors.dotsrc.org/artix-linux/repos/$repo/os/$arch
Server = https://mirror.pascalpuffke.de/artix-linux/$repo/os/$arch

# Core Arch repos
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# FenrirOS custom repo (future home of patched packages)
# [fenriros]
# Server = https://repo.fenriros.org/$arch
