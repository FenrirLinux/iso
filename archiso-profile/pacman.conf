#
# FenrirOS pacman.conf
# Artix-based with CachyOS kernel only
#

[options]
HoldPkg      = pacman glibc
Architecture = auto
Color
CheckSpace
ParallelDownloads = 5
SigLevel    = Never
LocalFileSigLevel = Optional
IgnorePkg   = dinit dinit-userservices s6 s6-rc runit

# CachyOS repo - ONLY for the kernel
# Must come first so kernel packages are preferred from here
[cachyos]
Include = /etc/pacman.d/cachyos-mirrorlist

# Artix repos - systemd-free base system
[system]
Server = https://mirrors.dotsrc.org/artix-linux/repos/$repo/os/$arch
Server = https://mirror.pascalpuffke.de/artix-linux/$repo/os/$arch

[world]
Server = https://mirrors.dotsrc.org/artix-linux/repos/$repo/os/$arch
Server = https://mirror.pascalpuffke.de/artix-linux/$repo/os/$arch

[galaxy]
Server = https://mirrors.dotsrc.org/artix-linux/repos/$repo/os/$arch
Server = https://mirror.pascalpuffke.de/artix-linux/$repo/os/$arch

# Arch repos - after Artix so Artix packages take priority
[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# FenrirOS custom repo (future)
# [fenriros]
# Server = https://repo.fenriros.org/$arch
