# FenrirOS - Calamares services-openrc module
# /etc/calamares/modules/services-openrc.conf
#
# Configures which OpenRC services are enabled on the installed system.
# Calamares calls rc-update add/del for each entry.

---
services:
    # --- Core boot services ---
    - name: udev
      mandatory: true
      runlevel: sysinit

    - name: dbus
      mandatory: true
      runlevel: default

    - name: elogind
      mandatory: true
      runlevel: default

    - name: seatd
      mandatory: false
      runlevel: default

    # --- Networking ---
    - name: NetworkManager
      mandatory: true
      runlevel: default

    # --- Display manager ---
    - name: sddm
      mandatory: true
      runlevel: default

    # --- Session services ---
    - name: polkit
      mandatory: true
      runlevel: default

    - name: acpid
      mandatory: false
      runlevel: default

    - name: cronie
      mandatory: false
      runlevel: default

    # --- Gaming ---
    - name: gamemoded
      mandatory: false
      runlevel: default
